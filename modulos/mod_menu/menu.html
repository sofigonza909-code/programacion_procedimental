<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bulma -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">

    <title>Menú</title>

    <style>
        body {
            background-color: #1e1e2f;
            color: white;
        }

        .card {
            background-color: #2a2a40;
            color: white;
        }

        .title {
            color: white;
        }

        .price {
            color: #00d1b2;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <section class="section">
        <div class="container">

            <h1 class="title has-text-centered">🍽️ MENÚ DEL RESTAURANTE</h1>

            <div class="columns is-multiline">

                <!-- Producto 1 -->
                <div class="column is-one-third">
                    <div class="card">
                        <div class="card-image">
                            <figure class="image">
                                <img src="https://www.santaelena.com.co/wp-content/uploads/2021/03/MG_6571-600x468.jpg">
                            </figure>
                        </div>
                        <div class="card-content">
                            <p class="title is-5">Milhoja</p>
                            <p>Delicioso postre tradicional.</p>
                            <p class="price">$8.000</p>
                        </div>
                    </div>
                </div>

                <!-- Producto 2 -->
                <div class="column is-one-third">
                    <div class="card">
                        <div class="card-image">
                            <figure class="image">
                                <img src="https://www.recetasnestlecam.com/sites/default/files/2023-03/postre-en-vaso-dulce-leche.jpg.jpg">
                            </figure>
                        </div>
                        <div class="card-content">
                            <p class="title is-5">Tres Leches</p>
                            <p>Suave y cremoso.</p>
                            <p class="price">$7.000</p>
                        </div>
                    </div>
                </div>

                <!-- Producto 3 -->
                <div class="column is-one-third">
                    <div class="card">
                        <div class="card-image">
                            <figure class="image">
                                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcREdwYBE5h2a_9m2kXeux5o88FEQRSNYrBoiQ&s">
                            </figure>
                        </div>
                        <div class="card-content">
                            <p class="title is-5">Mermelada</p>
                            <p>Hecha en casa.</p>
                            <p class="price">$5.000</p>
                        </div>
                    </div>
                </div>

            </div>

        </div>
    </section>

</body>
</html>
