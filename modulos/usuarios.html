<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuarios</title>
</head>
<body>

    <h1>USUARIOS</h1>
    <hr>

    <form>
        <label>Nombre completo:</label><br>
        <input type="text" id="nombre_completo" name="nombre_completo"><br><br>

        <label>Email:</label><br>
        <input type="email" id="email" name="email"><br><br>

        <label>Número de celular:</label><br>
        <input type="tel" id="numero_celular" name="numero_celular"><br><br>

        <label>Género:</label><br>
        <select id="genero" name="genero">
            <option value="">Seleccione</option>
            <option value="masculino">Masculino</option>
            <option value="femenino">Femenino</option>
            <option value="otro">Otro</option>
        </select><br><br>

        <label>Fecha de nacimiento:</label><br>
        <input type="date" id="fecha_nacimiento" name="fecha_nacimiento"><br><br>

        <label>Dirección:</label><br>
        <input type="text" id="direccion" name="direccion"><br><br>

        <label>Contraseña:</label><br>
        <input type="password" id="contrasena" name="contrasena"><br><br>

        <input type="submit" value="Enviar">
    </form>

</body>
</html>
